<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c3134">
<title>Hub Cards · BookHub 📚</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  /* هوية BookHub: بترولي/تركواز + ذهبي */
  --bg1:#0c3134; --bg2:#134a4e; --bg3:#1d6e74;
  --gold:#f5b83e; --gold-d:#d99a2a;
  --pink:#3fc6c9; --green:#4ade80; --red:#f87171;
  --blue:#60a5fa; --purple:#2b8a8f;
  --card:#fbf6ea; --ink:#103a3d; --muted:#5f9093;
  --shadow:0 18px 40px rgba(0,0,0,.45);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Tajawal',sans-serif;}
html,body{height:100%;}
body{
  background:radial-gradient(circle at 50% 0%,var(--bg3),var(--bg1) 60%);
  color:#fff;overflow:hidden;position:fixed;inset:0;
  display:flex;justify-content:center;
  user-select:none;-webkit-user-select:none;
}
#app{
  width:100%;max-width:480px;height:100%;
  display:flex;flex-direction:column;position:relative;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}
.screen{
  flex:1;display:none;flex-direction:column;
  padding:22px 20px;overflow-y:auto;animation:fade .35s ease;
}
.screen.active{display:flex;}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes flip{from{transform:rotateY(90deg);opacity:0}to{transform:rotateY(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

h1{font-weight:900;}
.btn{
  border:none;border-radius:18px;padding:17px 20px;font-size:19px;font-weight:800;
  cursor:pointer;width:100%;transition:transform .12s,filter .12s;font-family:inherit;
}
.btn:active{transform:scale(.96);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#3a2208;box-shadow:0 8px 22px rgba(245,196,81,.35);}
.btn-green{background:linear-gradient(135deg,#4ade80,#22c55e);color:#06310f;box-shadow:0 8px 22px rgba(74,222,128,.3);}
.btn-red{background:linear-gradient(135deg,#fb7185,#ef4444);color:#fff;box-shadow:0 8px 22px rgba(248,113,113,.3);}
.btn-ghost{background:rgba(255,255,255,.08);color:#fff;border:1.5px solid rgba(255,255,255,.16);}
.btn:disabled{opacity:.4;}
.mute-btn{position:absolute;top:calc(10px + env(safe-area-inset-top));left:12px;z-index:40;width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.mute-btn:active{transform:scale(.9);}
.modal{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(8,20,22,.72);backdrop-filter:blur(3px);padding:24px;animation:fade .2s;}
.modal.hidden{display:none;}
.modal-box{background:#134a4e;border:2px solid var(--gold);border-radius:22px;padding:20px 16px;max-width:360px;width:100%;box-shadow:var(--shadow);}
.modal-title{font-weight:900;font-size:18px;color:var(--gold);text-align:center;margin-bottom:14px;line-height:1.5;}
.modal-box .btn{margin-bottom:9px;}

/* ===== START ===== */
#start{justify-content:center;align-items:center;text-align:center;gap:16px;padding:14px 12px;background:#0e3138 url('shelf-bg.svg') center center / cover no-repeat;}
.flip{width:100%;max-width:440px;perspective:1600px;cursor:pointer;}
.flip-inner{position:relative;width:100%;transition:transform 1.05s cubic-bezier(.45,.05,.25,1);transform-style:preserve-3d;}
.flip-inner.flipped{transform:rotateY(180deg);}
.flip-face{width:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
.flip-face img,.flip-face svg{width:100%;height:auto;display:block;filter:drop-shadow(0 18px 40px rgba(0,0,0,.55));}
.flip-back{position:relative;}
.flip-front{position:absolute;top:0;left:0;transform:rotateY(180deg);}
/* كارت السحب في اللعب */
.deck-card{display:flex;flex-direction:column;align-items:center;gap:14px;cursor:pointer;animation:fade .4s;}
.deck-card img{width:210px;max-width:62vw;height:auto;display:block;filter:drop-shadow(0 14px 30px rgba(0,0,0,.5));transition:transform .15s;}
.deck-card:active img{transform:scale(.95) rotate(-2deg);}
.deck-lbl{color:var(--gold);font-weight:800;font-size:16px;}
.btn-play{width:100%;max-width:440px;background:linear-gradient(135deg,#f5b83e,#e0962a);color:#143a42;border:2px solid #f6efdd;box-shadow:0 10px 24px rgba(0,0,0,.45);font-size:21px;}
.logo{animation:pulse 3s ease-in-out infinite;filter:drop-shadow(0 10px 18px rgba(0,0,0,.45));}
.logo svg{width:230px;max-width:66vw;height:auto;display:block;margin:0 auto;}
#start h1{font-size:42px;color:var(--gold);letter-spacing:-1px;}
.tag{color:#aed8d9;font-size:16px;font-weight:500;margin-bottom:8px;}
.chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:14px 0 26px;}
.chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);padding:7px 14px;border-radius:30px;font-size:13px;color:#d4eeef;}

/* ===== SETUP ===== */
.head{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.head h1{font-size:26px;color:var(--gold);}
.section-t{font-size:15px;color:#aed8d9;margin:18px 0 10px;font-weight:700;}
.counter{display:flex;align-items:center;justify-content:center;gap:22px;margin:6px 0;}
.counter .num{font-size:54px;font-weight:900;color:var(--gold);min-width:60px;}
.cbtn{width:56px;height:56px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:30px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cbtn:active{transform:scale(.9);}
.pinputs{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.pinput{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border-radius:14px;padding:4px 14px;}
.pinput .av{font-size:24px;}
.pinput input{flex:1;background:none;border:none;color:#fff;font-size:17px;font-weight:600;padding:14px 4px;font-family:inherit;outline:none;}
.pinput input::placeholder{color:#5f9093;}

/* ===== TURN / PASS ===== */
#pass{justify-content:center;align-items:center;text-align:center;gap:14px;}
.pass-av{font-size:80px;animation:pop .4s;}
.pass-name{font-size:34px;font-weight:900;color:var(--gold);}
.pass-sub{color:#aed8d9;font-size:16px;}

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;}
.round-pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:30px;padding:8px 16px;font-size:14px;font-weight:700;}
.round-pill b{color:var(--gold);}
.dn-pill{background:linear-gradient(135deg,#fb7185,#ef4444);color:#fff;border-radius:30px;padding:8px 16px;font-size:13px;font-weight:800;animation:pulse 1.5s infinite;}
.turn-player{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;}

/* mini scoreboard */
.mini-scores{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.ms{flex-shrink:0;background:rgba(255,255,255,.06);border-radius:12px;padding:8px 12px;text-align:center;min-width:62px;border:1px solid transparent;}
.ms.cur{border-color:var(--gold);background:rgba(245,196,81,.12);}
.ms .nm{font-size:12px;color:#aed8d9;white-space:nowrap;max-width:70px;overflow:hidden;text-overflow:ellipsis;}
.ms .sc{font-size:22px;font-weight:900;color:var(--gold);}

/* hand */
.hand{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.hand-card{flex:1;min-width:0;border-radius:14px;padding:10px 6px;text-align:center;font-size:12px;font-weight:800;cursor:pointer;border:none;color:#fff;position:relative;font-family:inherit;}
.hc-immunity{background:linear-gradient(135deg,#60a5fa,#3b82f6);}
.hc-double{background:linear-gradient(135deg,#fb923c,#f97316);}
.hc-raid{background:linear-gradient(135deg,#fb7185,#e11d48);}
.hc-bravo{background:linear-gradient(135deg,#34d399,#0d9488);}
.hand-card .ic{font-size:26px;display:block;margin-bottom:3px;}
.hand-card:active{transform:scale(.93);}
.hand-card.on{outline:3px solid var(--gold);outline-offset:1px;}
.hand-empty{color:#5f9093;font-size:13px;text-align:center;width:100%;padding:6px;}

/* draw / card */
.draw-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:20px;}
.deck{
  width:190px;height:260px;border-radius:24px;cursor:pointer;
  background:repeating-linear-gradient(45deg,#1d6e74,#1d6e74 12px,#134a4e 12px,#134a4e 24px);
  border:3px solid var(--gold);box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;
  position:relative;transition:transform .15s;
}
.deck:active{transform:scale(.95) rotate(-2deg);}
.deck .bk{font-size:64px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4));}
.deck .lbl{color:var(--gold);font-weight:800;font-size:15px;}
.deck::before{content:"";position:absolute;inset:8px;border:1.5px dashed rgba(245,196,81,.4);border-radius:18px;}

/* question card */
.qcard{
  background:#f6efdd;color:#15414a;border-radius:22px;padding:28px 26px 22px;
  box-shadow:var(--shadow);width:100%;animation:flip .5s;position:relative;overflow:hidden;
  border:3px solid #e3a83c;
}
.qcard.fail{animation:shake .5s;}
.qcard::before{content:"";position:absolute;inset:7px;border:2px dashed #2a7c84;border-radius:13px;opacity:.5;pointer-events:none;}
.corner{position:absolute;width:50px;height:50px;pointer-events:none;z-index:1;}
.c-tl{top:5px;left:5px;}
.c-tr{top:5px;right:5px;transform:scaleX(-1);}
.c-bl{bottom:5px;left:5px;transform:scaleY(-1);}
.c-br{bottom:5px;right:5px;transform:scale(-1);}
.qcard .qtype{font-size:13px;font-weight:800;color:#2a7c84;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:6px;position:relative;z-index:2;}
.diff{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;color:#fff;}
.d1{background:#22c55e;}.d2{background:#f59e0b;}.d3{background:#ef4444;}
.qtext{font-size:27px;font-weight:900;line-height:1.4;margin:10px 0 4px;position:relative;z-index:2;}
.qruling{margin-top:16px;background:#fff3d6;border:1.5px dashed var(--gold-d);border-radius:16px;padding:13px 14px;position:relative;z-index:2;}
.qruling .rl{font-size:12px;font-weight:800;color:var(--gold-d);display:flex;align-items:center;gap:5px;}
.qruling .rt{font-size:15px;font-weight:600;color:#5a4a20;margin-top:4px;line-height:1.5;}

/* timer ring */
.timer{position:relative;width:120px;height:120px;margin:4px auto;}
.timer svg{transform:rotate(-90deg);}
.timer .tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:900;color:#fff;}
.timer.warn .tnum{color:var(--red);animation:pulse .5s infinite;}

.judge-q{text-align:center;font-size:16px;color:#aed8d9;font-weight:700;margin:6px 0;}
.btn-row{display:flex;gap:10px;}

/* result banners */
.banner{text-align:center;padding:30px 20px;border-radius:26px;animation:pop .4s;width:100%;}
.banner.ok{background:linear-gradient(135deg,rgba(74,222,128,.18),rgba(34,197,94,.1));border:2px solid var(--green);}
.banner.no{background:linear-gradient(135deg,rgba(248,113,113,.18),rgba(239,68,68,.1));border:2px solid var(--red);}
.banner .big{font-size:64px;}
.banner h2{font-size:28px;font-weight:900;margin:6px 0;}
.banner .pts{font-size:20px;font-weight:800;}
.banner .pts.plus{color:var(--green);}
.banner .pts.minus{color:var(--red);}
.ruling-do{background:#fff3d6;color:#5a4a20;border-radius:16px;padding:16px;margin-top:16px;text-align:right;}
.ruling-do .h{font-weight:900;color:var(--gold-d);margin-bottom:6px;font-size:15px;}
.ruling-do .t{font-size:17px;font-weight:600;line-height:1.5;}

/* special draw */
#specialDraw{justify-content:center;align-items:center;text-align:center;gap:18px;}
.streak-badge{font-size:18px;font-weight:800;color:var(--gold);}
.spec-card{width:240px;border-radius:22px;padding:34px 22px;box-shadow:var(--shadow);animation:flip .6s;background:#f6efdd;color:#15414a;border:3px solid #e3a83c;position:relative;overflow:hidden;}
.spec-card::before{content:"";position:absolute;inset:7px;border:2px dashed #2a7c84;border-radius:13px;opacity:.5;pointer-events:none;}
.spec-card .ic,.spec-card h2,.spec-card p{position:relative;z-index:2;}
.spec-card h2{color:#15414a;}
.spec-card .ic{font-size:70px;}
.spec-card h2{font-size:26px;font-weight:900;margin:10px 0 6px;}
.spec-card p{font-size:15px;opacity:.95;line-height:1.5;}

/* gameover */
#over{justify-content:flex-start;}
.trophy{font-size:80px;text-align:center;animation:pop .5s;}
#over h1{text-align:center;font-size:30px;color:var(--gold);margin-bottom:4px;}
.winner-name{text-align:center;font-size:24px;font-weight:900;margin-bottom:20px;}
.rank{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);border-radius:16px;padding:14px 16px;margin-bottom:10px;animation:fade .4s;}
.rank.first{background:linear-gradient(135deg,rgba(245,196,81,.22),rgba(245,196,81,.08));border:1.5px solid var(--gold);}
.rank .pos{font-size:24px;font-weight:900;width:36px;}
.rank .rav{font-size:30px;}
.rank .rn{flex:1;font-size:18px;font-weight:800;}
.rank .rs{font-size:24px;font-weight:900;color:var(--gold);}

.spacer{flex:1;}
.footer-btns{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.toast{
  position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:#134a4e;border:1.5px solid var(--gold);color:#fff;padding:13px 22px;border-radius:30px;
  font-weight:700;font-size:15px;z-index:50;box-shadow:var(--shadow);animation:pop .3s;max-width:90%;text-align:center;
}
.hint{font-size:13px;color:#5f9093;text-align:center;margin-top:10px;line-height:1.6;}
</style>
</head>

/* ====================== مؤثرات صوتية (Web Audio) ====================== */
const SFX = {
  ac:null, master:null, muted:false, ready:false,
  init(){
    if(this.ready) return;
    try{
      this.ac = new (window.AudioContext||window.webkitAudioContext)();
      this.master = this.ac.createGain();
      this.master.gain.value = 0.85;
      this.master.connect(this.ac.destination);
      this.ready = true;
    }catch(e){}
    this.muted = localStorage.getItem('hc_muted')==='1';
  },
  resume(){ try{ if(this.ac && this.ac.state==='suspended') this.ac.resume(); }catch(e){} },
  // freq, بداية(ث), مدة(ث), شكل الموجة, مستوى, تردد-نهائي(انزلاق)
  tone(freq, t0, dur, type='sine', vol=0.18, to=null){
    if(!this.ready || this.muted) return;
    try{
      const o=this.ac.createOscillator(), g=this.ac.createGain();
      const s=this.ac.currentTime+t0;
      o.type=type; o.frequency.setValueAtTime(freq,s);
      if(to) o.frequency.exponentialRampToValueAtTime(Math.max(1,to), s+dur);
      g.gain.setValueAtTime(0.0001,s);
      g.gain.exponentialRampToValueAtTime(vol, s+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, s+dur);
      o.connect(g); g.connect(this.master);
      o.start(s); o.stop(s+dur+0.03);
    }catch(e){}
  },
  seq(notes){ notes.forEach(n=>this.tone(n[0],n[1],n[2],n[3]||'sine',n[4]||0.18,n[5]||null)); },
  tap(){ this.init(); this.resume(); this.tone(430,0,0.05,'triangle',0.10,300); },
  draw(){ this.init(); this.resume(); this.tone(280,0,0.18,'sine',0.16,720); this.tone(720,0.05,0.10,'triangle',0.07); },
  tick(){ this.tone(1000,0,0.05,'square',0.08); },
  correct(){ this.seq([[660,0,0.12,'triangle',0.18],[880,0.09,0.13,'triangle',0.18],[1175,0.19,0.20,'sine',0.16]]); },
  streak(){ this.seq([[784,0,0.10,'triangle',0.16],[1047,0.09,0.10,'triangle',0.16],[1319,0.18,0.22,'sine',0.16]]); },
  wrong(){ this.tone(320,0,0.18,'sawtooth',0.18,150); this.tone(150,0.13,0.22,'square',0.12); },
  timeup(){ this.tone(240,0,0.5,'sawtooth',0.20,90); this.tone(120,0,0.5,'square',0.12); },
  special(){ this.seq([[523,0,0.16,'triangle',0.16],[659,0.09,0.16,'triangle',0.16],[784,0.18,0.16,'triangle',0.16],[1047,0.27,0.26,'sine',0.18]]); },
  shield(){ this.tone(520,0,0.18,'sine',0.18,1000); this.tone(1000,0.12,0.20,'sine',0.10); },
  reverse(){ this.tone(760,0,0.16,'triangle',0.16,360); this.tone(360,0.10,0.18,'triangle',0.15,760); },
  power(){ this.tone(300,0,0.22,'sawtooth',0.15,760); this.tone(520,0.09,0.16,'square',0.10); },
  raid(){ this.tone(440,0,0.10,'sawtooth',0.2,130); this.tone(170,0.09,0.24,'square',0.17,70); },
  bravo(){ this.seq([[523,0,0.12,'triangle',0.18],[659,0.10,0.12,'triangle',0.18],[784,0.20,0.12,'triangle',0.18],[1047,0.30,0.24,'sine',0.2]]); },
  flip(){ this.tone(820,0,0.07,'sine',0.10,420); this.tone(460,0.05,0.13,'triangle',0.10,820); },
  dn(){ this.tone(330,0,0.18,'sawtooth',0.16,660); this.tone(660,0.12,0.18,'square',0.12); },
  win(){ this.seq([[523,0,0.18,'triangle',0.20],[659,0.14,0.18,'triangle',0.20],[784,0.28,0.18,'triangle',0.20],[1047,0.42,0.30,'triangle',0.22],[1047,0.80,0.50,'sine',0.20],[1319,0.80,0.50,'sine',0.16]]); }
};

  localStorage.setItem('hc_muted', SFX.muted?'1':'0');
  updateMuteBtn();
  if(!SFX.muted){ SFX.resume(); SFX.tap(); }
}
function updateMuteBtn(){ const b=$('muteBtn'); if(b) b.textContent = SFX.muted?'🔇':'🔊'; }
// تهيئة الصوت على أول لمسة + نقرة خفيفة على الأزرار
document.addEventListener('pointerdown', e=>{
  SFX.init(); SFX.resume();
  if(e.target.closest('.btn,.cbtn,.hand-card,.deck') && !e.target.closest('#muteBtn')) SFX.tap();
}, {passive:true});

/* ====================== SETUP ====================== */
let setupCount=3;
function goSetup(){renderInputs();show('setup');}
function changePlayers(d){setupCount=Math.max(2,Math.min(5,setupCount+d));$('pcount').textContent=setupCount;renderInputs();}
function renderInputs(){
  const box=$('pinputs');const old=[...box.querySelectorAll('input')].map(i=>i.value);
  box.innerHTML='';
  for(let i=0;i<setupCount;i++){
    const row=document.createElement('div');row.className='pinput';
    row.innerHTML=`<span class="av">${AVATARS[i]}</span><input maxlength="12" placeholder="لاعب ${i+1}" value="${old[i]||''}">`;
    box.appendChild(row);
  }
}

function startGame(){
  const names=[...$('pinputs').querySelectorAll('input')].map((inp,i)=>inp.value.trim()||`لاعب ${i+1}`);
  G={
    players:names.map((n,i)=>({name:n,av:AVATARS[i],score:0,hand:[],streak:0,doubleArmed:false})),
    n:names.length, turn:0, round:1,
    card:null, ruling:null, awarded:false, extraDraw:false
  };
  nextTurnIntro();
}

/* ====================== تسلسل الأدوار ====================== */
function cur(){return G.players[G.turn % G.n];}
function isLastRound(){return G.round===10;}

function nextTurnIntro(){
  clearTimer();
  const p=cur();
  $('passAv').textContent=p.av;
  $('passName').textContent=p.name;
  $('passRound').textContent=`الجولة ${G.round} من 10`+(isLastRound()?" — ⚡ Double or Nothing!":"");
  if(isLastRound()) SFX.dn();
  show('pass');
}

function beginTurn(){
  G.card=null;G.ruling=null;G.awarded=false;
  renderTopbar();renderHand();
  $('gameBody').className='draw-wrap';
  $('gameBody').innerHTML=`
    <div class="deck-card" onclick="drawCard()">
      <img src="back-card.svg" alt="اسحب كارت">
      <div class="deck-lbl">👆 اضغط لسحب سؤال</div>
    </div>
    <div class="hint">اقرأ السؤال بصوت عالي، عندك ١٠ ثواني تجاوب،<br>والباقي يحكموا الإجابة صح ولا غلط.</div>`;
  show('game');
}

function renderTopbar(){
  $('roundNo').textContent=G.round;
  const p=cur();
  $('turnAv').textContent=p.av;$('turnName').textContent=p.name;
  $('dnPill').innerHTML=isLastRound()?`<div class="dn-pill">⚡ ×2 / −2</div>`:'';
}

function renderMini(){
  $('miniScores').innerHTML=G.players.map((p,i)=>
    `<div class="ms ${i===G.turn%G.n?'cur':''}"><div class="sc">${p.score}</div><div class="nm">${p.av} ${p.name}</div></div>`
  ).join('');
}

/* ====================== الكروت في اليد ====================== */
function renderHand(){
  renderMini();
  const p=cur();const box=$('hand');
  if(p.hand.length===0){box.innerHTML=`<div class="hand-empty">🃏 مفيش كروت خاصة في إيدك — اجمع ٣ صح ورا بعض!</div>`;return;}
  box.innerHTML=p.hand.map((k,idx)=>{
    const s=SPECIALS[k];const armed=(k==='double'&&p.doubleArmed)?'on':'';
    return `<button class="hand-card ${s.cls} ${armed}" onclick="playHand(${idx})"><span class="ic">${s.ic}</span>${s.name}</button>`;
  }).join('');
}

function playHand(idx){
  const p=cur();const k=p.hand[idx];
  if(k==='double'){
    if(p.doubleArmed){toast("ضعف النقط مفعّل بالفعل 🔥");return;}
    p.doubleArmed=true;SFX.power();toast("🔥 فعّلت ضعف النقط — السؤال ده بنقطتين!");renderHand();return;
  }
  if(k==='immunity'){toast("🛡️ «ضهرنا اتحمى» بيتستخدم وقت ما يقع عليك حكم.");return;}
  if(k==='raid'){ openRaid(); return; }
  if(k==='bravo'){ playBravo(); return; }
}

/* ====================== سحب السؤال ====================== */
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function pickRuling(q){
  // نظام الصعوبة: سؤال سهل → حكم تقيل، سؤال صعب → حكم خفيف
  const want = 4 - q.d;            // d1→lvl3 , d2→lvl2 , d3→lvl1
  const pool = RULINGS.filter(r=>r.lvl===want);
  return rand(pool.length?pool:RULINGS);
}

function drawCard(){
  SFX.draw();
  const q=rand(QUESTIONS);
  G.card=q;G.ruling=pickRuling(q);
  const diffTxt=['','سهل','متوسط','صعب'][q.d];
  $('gameBody').className='';
  $('gameBody').innerHTML=`
    <div class="qcard" id="qcard">${CORNERS}
      <div class="qtype">📖 سؤال <span class="diff d${q.d}">${diffTxt}</span></div>
      <div class="qtext">${q.t}</div>
      <div class="qruling">
        <div class="rl">⚖️ الحكم لو ماجاوبتش</div>
        <div class="rt">${G.ruling.t}</div>
      </div>
    </div>
    <div class="timer" id="timer">
      <svg width="120" height="120"><circle cx="60" cy="60" r="54" stroke="rgba(255,255,255,.12)" stroke-width="9" fill="none"/>
      <circle id="ring" cx="60" cy="60" r="54" stroke="var(--gold)" stroke-width="9" fill="none" stroke-linecap="round"
       stroke-dasharray="339.29" stroke-dashoffset="0"/></svg>
      <div class="tnum" id="tnum">10</div>
    </div>
    <div class="judge-q">⏱️ اللاعبين يحكموا: الإجابة مقبولة؟</div>
    <div class="btn-row">
      <button class="btn btn-green" onclick="judge(true)">صح ✓</button>
      <button class="btn btn-red" onclick="judge(false)">غلط ✗</button>
    </div>`;
  startTimer();
}

/* ====================== المؤقّت ====================== */
let timerInt=null;
function startTimer(){
  clearTimer();
  let t=10.0;const C=339.29;const ring=$('ring');const tnum=$('tnum');const box=$('timer');
  timerInt=setInterval(()=>{
    t-=0.1;
    if(t<=0){t=0;clearTimer();timeUp();return;}
    const frac=t/10;
    ring.style.strokeDashoffset=(C*(1-frac)).toFixed(1);
    tnum.textContent=Math.ceil(t);
    if(t<=3){box.classList.add('warn');ring.style.stroke='var(--red)';if(Math.abs(t-Math.round(t))<0.05)SFX.tick();}
  },100);
}
function clearTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}}

function timeUp(){
  SFX.timeup();
  const c=$('qcard');if(c)c.classList.add('fail');
  judge(false,true);
}

/* ====================== الحكم على الإجابة ====================== */
function judge(correct,timeout=false){
  if(G.awarded)return;G.awarded=true;clearTimer();
  const p=cur();
  if(correct){correctAnswer(p);}
  else{failAnswer(p,timeout);}
}

function correctAnswer(p){
  SFX.correct();
  let pts=isLastRound()?2:1;
  let doubled=false;
  if(p.doubleArmed){pts*=2;doubled=true;p.doubleArmed=false;p.hand.splice(p.hand.indexOf('double'),1);}
  p.score+=pts;p.streak++;
  const gotStreak = p.streak>0 && p.streak%3===0;
  if(gotStreak) setTimeout(()=>SFX.streak(),260);
  $('gameBody').className='draw-wrap';
  $('gameBody').innerHTML=`
    <div class="banner ok">
      <div class="big">✅</div>
      <h2>إجابة صح!</h2>
      <div class="pts plus">+${pts} ${doubled?'🔥 (ضعف النقط!)':''}</div>
      <div style="margin-top:10px;color:#aed8d9">🔥 سلسلة: ${p.streak} ورا بعض</div>
    </div>
    <button class="btn btn-gold" onclick="${gotStreak?'goSpecial()':'endTurn()'}">
      ${gotStreak?'٣ صح! اسحب كارت خاص 🎁':'الدور اللي بعده ›'}
    </button>`;
  renderMini();
}

function failAnswer(p,timeout){
  SFX.wrong();
  p.streak=0;
  let deduction = isLastRound()?2:0;
  const hasImm=p.hand.includes('immunity');
  let actionBtns=`<button class="btn btn-gold" onclick="endTurn()">طبّقت الحكم — التالي ›</button>`;
  let extra='';
  if(hasImm){extra+=`<button class="btn btn-ghost" onclick="useImmunity()">🛡️ ضهرنا اتحمى — الغي الحكم</button>`;}
  $('gameBody').className='draw-wrap';
  $('gameBody').innerHTML=`
    <div class="banner no">
      <div class="big">${timeout?'⏰':'❌'}</div>
      <h2>${timeout?'خلص الوقت!':'إجابة غلط'}</h2>
      ${deduction?`<div class="pts minus">−${deduction} (Double or Nothing)</div>`:`<div style="color:#aed8d9">يتطبّق عليك الحكم 👇</div>`}
      <div class="ruling-do">
        <div class="h">⚖️ الحكم</div>
        <div class="t">${G.ruling.t}</div>
      </div>
    </div>
    <div class="footer-btns">${extra}${actionBtns}</div>`;
  if(deduction){p.score=Math.max(0,p.score-deduction);} // ماينزلش تحت الصفر
  G._deducted=deduction;
  renderMini();
}

function useImmunity(){
  const p=cur();p.hand.splice(p.hand.indexOf('immunity'),1);
  if(G._deducted){p.score+=G._deducted;G._deducted=0;} // رجّع النقط المخصومة
  SFX.shield();toast("🛡️ ضهرنا اتحمى — اتلغى الحكم!");
  renderMini();
  $('gameBody').innerHTML=`<div class="banner ok"><div class="big">🛡️</div><h2>اتلغى الحكم!</h2><div style="color:#aed8d9;margin-top:8px">«ضهرنا اتحمى» حماك المرة دي.</div></div><button class="btn btn-gold" style="margin-top:14px" onclick="endTurn()">التالي ›</button>`;
}

/* 💥 صورم ثقافي: اخصم نقطة من منافس */
function openRaid(){
  const others=G.players.map((pl,i)=>({pl,i})).filter(o=>o.i!==G.turn%G.n);
  if(!others.length){toast("مفيش منافسين!");return;}
  openModal("💥 صورم ثقافي — اخصم نقطة من مين؟",
    others.map(o=>`<button class="btn btn-ghost" onclick="doRaid(${o.i})">${o.pl.av} ${o.pl.name} (${o.pl.score} نقطة)</button>`).join(''));
}
function doRaid(targetIdx){
  const p=cur();const i=p.hand.indexOf('raid');if(i>=0)p.hand.splice(i,1);
  const tgt=G.players[targetIdx];
  tgt.score=Math.max(0,tgt.score-1);
  SFX.raid();closeModal();renderHand();renderMini();
  toast(`💥 خصمت نقطة من ${tgt.av} ${tgt.name}!`);
}

/* 👏 برااااافو عليك: اسحب كمان كارت */
function playBravo(){
  const p=cur();const i=p.hand.indexOf('bravo');if(i>=0)p.hand.splice(i,1);
  G.extraDraw=true;SFX.bravo();renderHand();
  toast("👏 برااااافو! بعد السؤال ده هتسحب كارت إضافي 🎁");
}

/* مودال عام */
function openModal(title,html){$('modalTitle').innerHTML=title;$('modalBody').innerHTML=html;$('modal').classList.remove('hidden');}
function closeModal(){$('modal').classList.add('hidden');}

/* ====================== الكارت الخاص (سلسلة ٣) ====================== */
function goSpecial(){
  const p=cur();
  const keys=Object.keys(SPECIALS);
  const k=rand(keys);p.hand.push(k);G._lastSpecial=k;
  const s=SPECIALS[k];
  SFX.special();
  $('specCardBox').innerHTML=`<div class="spec-card">${CORNERS}<div class="ic">${s.ic}</div><h2>${s.name}</h2><p>${s.desc}</p></div>`;
  show('specialDraw');
}
function afterSpecial(){show('game');endTurn();}

/* ====================== إنهاء الدور ====================== */
function endTurn(){
  G.awarded=false;
  if(G.extraDraw){ G.extraDraw=false; toast("👏 كارت إضافي — اسحب تاني!"); beginTurn(); return; }
  G.turn++;
  // خلصت جولة كاملة؟
  if(G.turn % G.n === 0){
    G.round++;
    if(G.round>10){return gameOver();}
  }
  nextTurnIntro();
}

/* ====================== النهاية ====================== */
function gameOver(){
  clearTimer();
  const sorted=[...G.players].sort((a,b)=>b.score-a.score);
  const top=sorted[0];
  const tied=sorted.filter(p=>p.score===top.score);
  $('winnerName').innerHTML = tied.length>1
    ? `🤝 تعادل! ${tied.map(p=>p.av+' '+p.name).join(' و ')}`
    : `🎉 الكسبان: ${top.av} ${top.name}`;
  const medals=['🥇','🥈','🥉'];
  $('ranks').innerHTML=sorted.map((p,i)=>
    `<div class="rank ${i===0?'first':''}">
       <div class="pos">${medals[i]||(i+1)}</div>
       <div class="rav">${p.av}</div>
       <div class="rn">${p.name}</div>
       <div class="rs">${p.score}</div>
     </div>`).join('');
  SFX.win();
  show('over');
}

function rematch(){
  G.players.forEach(p=>{p.score=0;p.hand=[];p.streak=0;p.doubleArmed=false;});
  G.turn=0;G.round=1;G.awarded=false;
  nextTurnIntro();
}

/* ====================== توست ====================== */
let toastT=null;
function toast(msg){
  let el=document.querySelector('.toast');if(el)el.remove();
  el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);
  clearTimeout(toastT);toastT=setTimeout(()=>el.remove(),2200);
}

/* (شريط الكارت القديم اتشال — الكارت بقى كريمي بإطار زخرفي) */

/* حالة زرار الكتم عند التحميل */
SFX.muted = localStorage.getItem('hc_muted')==='1';
updateMuteBtn();

/* انترو: الكارت يبدأ بضهره ويتقلب لوشّه */
startIntro();
</script>
</body>
</html>
