name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:        # يسمح بتشغيله يدوياً من تبويب Actions

permissions:
  contents: write           # عشان نرفع الـ APK على Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk hub-cards.apk

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hub-cards-apk
          path: hub-cards.apk

      - name: Publish APK to "latest" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Hub Cards — أحدث نسخة APK
          body: |
            ملف التثبيت لأحدث نسخة من لعبة Hub Cards (جزء من BookHub).
            نزّل `hub-cards.apk` وثبّته على تليفون أندرويد.
          files: hub-cards.apk
